# Copy this file to config/config.yaml for a new project.
# Only project identity and sample sheet are normally required; uncomment any
# block you want to override. Missing entries inherit from defaults.yaml.
config_version: 1

project:
  name: my-spatial-transcriptomics-project

samples: config/samples.tsv

modules:
  enabled:
    - qc
  auto_dependencies: true

# When using `--sdm conda`, keep the repository default `python`. During local
# development this may point to an existing interpreter.
# execution:
#   python: /absolute/path/to/environment/bin/python

# Repository resources are declared in defaults.yaml. Replace the project
# manifests themselves, or override their paths here. For pathway resources,
# copy pathway_gene_sets.template.tsv and record verified resources first;
# relative GMT paths inside that manifest resolve from the manifest directory.
# resources:
#   roi_aliases: config/roi_label_aliases.tsv
#   pathway_gene_sets: config/pathway_gene_sets.tsv
#   go_obo: null

